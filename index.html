<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
</head>
<body class="geist background">
        <section class="mx-auto min-h-screen max-w-md py-10 px-4 sm:px-8 md:px-16">
    <fieldset class="fieldset bg-white border-base-300 rounded-box w-full border p-4">

        <div class="logo grid justify-items-center p-4 sm:p-6 md:p-8">
            <img src="assets/github-logo.png" class="w-16 sm:w-20">
            <h3 class="primary-color font-semibold mt-6">GitHub Issues Tracker</h3>
            <p class="secondary-color font-normal text-center">Sign in to manage your issues</p>
        </div>

        <div class="space-y-2">
            <label class="label primary-color font-medium">Username</label>
            <input id="input-name" type="text" class="input w-full" placeholder="Enter Username" />
            <p class="label default">Default: admin</p><br>

            <label class="label primary-color font-medium">Password</label>
            <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />
            <p class="label default">Default: admin123</p>
        </div>

        <button class="btn btn-primary mt-4 w-full" id="sign-in">Sign In</button>

        <div class="flex items-center mt-6">
            <div class="flex-grow h-[1px] bg-[#E4E4E7]"></div>
            <span class="mx-3 text-sm text-gray-500">Or</span>
            <div class="flex-grow h-[1px] bg-[#E4E4E7]"></div>
        </div>

        <div class="grid justify-items-center mt-6 gap-2 text-center">
            <p class="secondary-color">Demo Credentials:</p>
            <div class="background p-4 sm:p-6 w-full rounded-lg">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>

    </fieldset>
</section>
    <script src="js/login.js"></script>
</body>
</html>
